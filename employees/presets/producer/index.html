<html><head><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:16px}
h2{font-size:16px;margin-bottom:12px;color:#7cb9ff}
.card{background:#16213e;border-radius:8px;padding:14px;margin-bottom:12px;border:1px solid #2a3a5c}
.card h3{font-size:13px;color:#7cb9ff;margin-bottom:10px}
.btn{display:inline-block;padding:6px 14px;margin:3px;border-radius:6px;border:none;cursor:pointer;font-size:12px;transition:all .15s}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-green{background:#059669;color:#fff}.btn-green:hover{background:#047857}
.btn-orange{background:#d97706;color:#fff}.btn-orange:hover{background:#b45309}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
</style></head><body>
<h2>🎬 制作人控制台</h2>
<div class="card"><h3>📋 冲刺管理</h3>
<button class="btn btn-blue" onclick="sendToChat('请查看当前冲刺进度，列出所有进行中的任务')">查看冲刺进度</button>
<button class="btn btn-green" onclick="sendToChat('请开始新的冲刺，帮我规划本周迭代任务')">开始新冲刺</button>
<button class="btn btn-orange" onclick="sendToChat('请生成本次冲刺的总结报告')">冲刺总结</button>
</div>
<div class="card"><h3>📊 范围与估算</h3>
<button class="btn btn-blue" onclick="sendToChat('请检查当前项目范围，是否有范围蔓延的风险')">范围检查</button>
<button class="btn btn-green" onclick="sendToChat('请帮我估算以下功能的开发工时：')">工时估算</button>
<button class="btn btn-red" onclick="sendToChat('请执行范围裁剪建议，识别可以推迟的功能')">范围裁剪</button>
</div>
<div class="card"><h3>👥 协调沟通</h3>
<button class="btn btn-blue" onclick="sendToChat('请整理各部门当前状态，生成跨部门协调清单')">跨部门协调</button>
<button class="btn btn-green" onclick="sendToChat('请安排一次站会，列出需要讨论的议题')">安排站会</button>
</div>
</body></html>
