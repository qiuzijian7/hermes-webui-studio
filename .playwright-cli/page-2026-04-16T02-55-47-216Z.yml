          - heading "Features" [level=2] [ref=e1342]
          - heading "Chat and agent" [level=3] [ref=e1343]
          - list [ref=e1344]:
            - listitem [ref=e1345]: Streaming responses via SSE (tokens appear as they are generated)
            - listitem [ref=e1346]: Multi-provider model support -- any Hermes API provider (OpenAI, Anthropic, Google, DeepSeek, Nous Portal, OpenRouter, MiniMax, Z.AI); dynamic model dropdown populated from configured keys
            - listitem [ref=e1347]: Send a message while one is processing -- it queues automatically
            - listitem [ref=e1348]: Edit any past user message inline and regenerate from that point
            - listitem [ref=e1349]: Retry the last assistant response with one click
            - listitem [ref=e1350]: Cancel a running task directly from the composer footer (Stop button next to Send)
            - listitem [ref=e1351]: Tool call cards inline -- each shows the tool name, args, and result snippet; expand/collapse all toggle for multi-tool turns
            - listitem [ref=e1352]: Subagent delegation cards -- child agent activity shown with distinct icon and indented border
            - listitem [ref=e1353]: Mermaid diagram rendering inline (flowcharts, sequence diagrams, gantt charts)
            - listitem [ref=e1354]: Thinking/reasoning display -- collapsible gold-themed cards for Claude extended thinking and o3 reasoning blocks
            - listitem [ref=e1355]: Approval card for dangerous shell commands (allow once / session / always / deny)
            - listitem [ref=e1356]: SSE auto-reconnect on network blips (SSH tunnel resilience)
            - listitem [ref=e1357]: File attachments persist across page reloads
            - listitem [ref=e1358]: Message timestamps (HH:MM next to each message, full date on hover)
            - listitem [ref=e1359]: Code block copy button with "Copied!" feedback
            - listitem [ref=e1360]: Syntax highlighting via Prism.js (Python, JS, bash, JSON, SQL, and more)
            - listitem [ref=e1361]: Safe HTML rendering in AI responses (bold, italic, code converted to markdown)
            - listitem [ref=e1362]: rAF-throttled token streaming for smoother rendering during long responses
            - listitem [ref=e1363]: Context usage indicator in composer footer -- token count, cost, and fill bar (model-aware)
          - heading "Sessions" [level=3] [ref=e1364]
          - list [ref=e1365]:
            - listitem [ref=e1366]: Create, rename, duplicate, delete, search by title and message content
            - listitem [ref=e1367]:
              - text: Session actions via
              - code [ref=e1368]: ⋯
              - text: dropdown per session — pin, move to project, archive, duplicate, delete
            - listitem [ref=e1369]: Pin/star sessions to the top of the sidebar (gold indicator)
            - listitem [ref=e1370]: Archive sessions (hide without deleting, toggle to show)
            - listitem [ref=e1371]: Session projects -- named groups with colors for organizing sessions
            - listitem [ref=e1372]: "Session tags -- add #tag to titles for colored chips and click-to-filter"
            - listitem [ref=e1373]: Grouped by Today / Yesterday / Earlier in the sidebar (collapsible date groups)
            - listitem [ref=e1374]: Download as Markdown transcript, full JSON export, or import from JSON
            - listitem [ref=e1375]: Sessions persist across page reloads and SSH tunnel reconnects
            - listitem [ref=e1376]: Browser tab title reflects the active session name
            - listitem [ref=e1377]: CLI session bridge -- CLI sessions from hermes-agent's SQLite store appear in the sidebar with a gold "cli" badge; click to import with full history and reply normally
            - listitem [ref=e1378]:
              - text: Token/cost display -- input tokens, output tokens, estimated cost shown per conversation (toggle in Settings or
              - code [ref=e1379]: /usage
              - text: command)
