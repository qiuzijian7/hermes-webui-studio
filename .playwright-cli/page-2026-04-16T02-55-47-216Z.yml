          - heading "Accessing on your phone with Tailscale" [level=2] [ref=e1286]
          - paragraph [ref=e1287]:
            - link "https://tailscale.com" [ref=e1288] [cursor=pointer]:
              - /url: <a href=
            - text: "\" target=\"_blank\" rel=\"noopener\">Tailscale is a zero-config mesh VPN built on"
            - text: WireGuard. Install it on your server and your phone, and they join the same
            - text: private network -- no port forwarding, no SSH tunnels, no public exposure.
          - paragraph [ref=e1289]:
            - text: The Hermes Web UI is fully responsive with a mobile-optimized layout
            - text: (hamburger sidebar, bottom navigation bar, touch-friendly controls), so it
            - text: works well as a daily-driver agent interface from your phone.
          - paragraph [ref=e1290]:
            - strong [ref=e1291]: "Setup:"
          - list [ref=e1292]:
            - listitem [ref=e1293]:
              - text: Install
              - link "https://tailscale.com/download" [ref=e1294] [cursor=pointer]:
                - /url: <a href=
              - text: "\" target=\"_blank\" rel=\"noopener\">"
              - link "https://tailscale.com/download" [ref=e1295] [cursor=pointer]:
                - /url: https://tailscale.com/download
              - text: "\" target=\"_blank\" rel=\"noopener\">Tailscale on your server and"
          - text: your iPhone/Android.
          - list [ref=e1296]:
            - listitem [ref=e1297]: "Start the WebUI listening on all interfaces with password auth enabled:"
          - generic [ref=e1298]: bash
          - code [ref=e1300]: HERMES_WEBUI_HOST=0.0.0.0 HERMES_WEBUI_PASSWORD=your-secret ./start.sh
          - list [ref=e1301]:
            - listitem [ref=e1302]:
              - text: Open
              - code [ref=e1303]:
                - link "http://&amp;lt;server-tailscale-ip&amp;gt;:8787" [ref=e1304] [cursor=pointer]:
                  - /url: <a href=
                - text: "\" target=\"_blank\" rel=\"noopener\">"
                - link "http://&amp;lt;server-tailscale-ip&amp;gt;:8787" [ref=e1305] [cursor=pointer]:
                  - /url: http://&amp;lt;server-tailscale-ip&amp;gt;:8787
              - text: in your phone's browser
          - text: (find your server's Tailscale IP in the Tailscale app or with
          - code [ref=e1306]: tailscale ip -4
          - text: on the server).
          - paragraph [ref=e1307]:
            - text: That's it. Traffic is encrypted end-to-end by WireGuard, and password auth
            - text: protects the UI at the application level. You can add it to your home screen
            - text: for an app-like experience.
