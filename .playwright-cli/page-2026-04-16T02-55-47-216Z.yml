          - paragraph [ref=e974]:
            - text: This gives you nearly
            - strong [ref=e975]: 1:1 parity with Hermes CLI from a convenient web UI
            - text: which you can access securely through an SSH tunnel from your Hermes setup. Single command to start this up, and a single command to SSH tunnel for access on your computer. Every single part of the web UI uses your existing Hermes agent and existing models, without requiring any additional setup.
          - separator [ref=e976]
          - heading "Why Hermes" [level=2] [ref=e977]
          - paragraph [ref=e978]:
            - text: Most AI tools reset every session. They don't know who you are, what you worked on, or what
            - text: conventions your project follows. You re-explain yourself every time.
          - paragraph [ref=e979]:
            - text: Hermes retains context across sessions, runs scheduled jobs while you're offline, and gets
            - text: smarter about your environment the longer it runs. It uses your existing Hermes agent setup,
            - text: your existing models, and requires no additional configuration to start.
          - paragraph [ref=e980]: "What makes it different from other agentic tools:"
          - list [ref=e981]:
            - listitem [ref=e982]:
              - strong [ref=e983]: Persistent memory
              - text: — user profile, agent notes, and a skills system that saves reusable
          - text: procedures; Hermes learns your environment and does not have to relearn it
          - list [ref=e984]:
            - listitem [ref=e985]:
              - strong [ref=e986]: Self-hosted scheduling
              - text: — cron jobs that fire while you're offline and deliver results to
          - text: Telegram, Discord, Slack, Signal, email, and more
          - list [ref=e987]:
            - listitem [ref=e988]:
              - strong [ref=e989]: 10+ messaging platforms
              - text: — the same agent available in the terminal is reachable from your phone
            - listitem [ref=e990]:
              - strong [ref=e991]: Self-improving skills
              - text: — Hermes writes and saves its own skills automatically from experience;
          - text: no marketplace to browse, no plugins to install
          - list [ref=e992]:
            - listitem [ref=e993]:
              - strong [ref=e994]: Provider-agnostic
              - text: — OpenAI, Anthropic, Google, DeepSeek, OpenRouter, and more
            - listitem [ref=e995]:
              - strong [ref=e996]: Orchestrates other agents
              - text: — can spawn Claude Code or Codex for heavy coding tasks and bring
          - text: the results back into its own memory
          - list [ref=e997]:
            - listitem [ref=e998]:
              - strong [ref=e999]: Self-hosted
              - text: — your conversations, your memory, your hardware
