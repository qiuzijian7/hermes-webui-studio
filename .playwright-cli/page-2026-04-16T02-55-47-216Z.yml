            - text: "— v0.50.0 UI overhaul (PR #242)"
            - text: "The biggest single contribution to the project: a complete UI redesign that moved model/profile/workspace controls into the composer footer, replaced the gear-icon settings panel with the Hermes Control Center (tabbed modal), removed the activity bar in favor of inline composer status, redesigned the session list with a"
            - code [ref=e1510]: ⋯
