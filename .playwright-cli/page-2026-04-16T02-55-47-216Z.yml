          - paragraph [ref=e1069]:
            - strong [ref=e1070]: The closest competitor is OpenClaw
            - text: — both are always-on, self-hosted, open-source agents
            - text: "with memory, cron, and messaging. The key differences: Hermes writes and saves its own skills"
            - text: automatically as a core behavior (OpenClaw's skill system centers on a community marketplace);
            - text: Hermes is more stable across updates (OpenClaw has documented release regressions and ClawHub
            - text: has had security incidents involving malicious skills); and Hermes runs natively in the Python
            - text: ecosystem. See [HERMES.md](HERMES.md) for the full side-by-side.
