            - listitem [ref=e1383]: Breadcrumb navigation with clickable path segments
            - listitem [ref=e1384]: Preview text, code, Markdown (rendered), and images inline
            - listitem [ref=e1385]: Edit, create, delete, and rename files; create folders
            - listitem [ref=e1386]: Binary file download (auto-detected from server)
            - listitem [ref=e1387]: File preview auto-closes on directory navigation (with unsaved-edit guard)
            - listitem [ref=e1388]: Git detection -- branch name and dirty file count badge in workspace header
            - listitem [ref=e1389]: Right panel is drag-resizable
