          - heading "Contributors" [level=2] [ref=e1504]
          - paragraph [ref=e1505]: Hermes WebUI is built with help from the open-source community. Every PR — whether merged directly or incorporated via rebase — shapes the project, and we're grateful to everyone who has taken the time to contribute.
